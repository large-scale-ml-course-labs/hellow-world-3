name: Check

on:
  pull_request:

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout student solution
        uses: actions/checkout@v4

      # Run the grader from the repo's *base* branch, never the student's PR
      # copy, so editing grade.py in a PR cannot influence the result.
      - name: Checkout canonical grader (base branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .base
          sparse-checkout: grade.py
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Grade output.txt
        run: python .base/grade.py --file output.txt --expected "hellow world 3"
