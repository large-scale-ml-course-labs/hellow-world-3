name: Check

on:
  pull_request:

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout student solution
        uses: actions/checkout@v4

      # The grader is inlined here on purpose. On pull_request, GitHub runs the
      # workflow from the repo's base branch, not the PR — so students can't see
      # or modify the grading logic from their fork.
      - name: Grade output.txt
        env:
          EXPECTED: "hellow world 3"
        run: |
          python3 - <<'PY'
          import os, sys
          expected = os.environ["EXPECTED"].strip()
          path = "output.txt"
          if not os.path.exists(path):
              print(f"::error::File '{path}' not found. Did you commit it?")
              sys.exit(1)
          with open(path, encoding="utf-8") as f:
              actual = f.read().strip()
          if actual == expected:
              print(f"✅ Correct! '{path}' contains exactly: {expected!r}")
              sys.exit(0)
          print("❌ Wrong answer.")
          print(f"   expected: {expected!r}")
          print(f"   got:      {actual!r}")
          sys.exit(1)
          PY
